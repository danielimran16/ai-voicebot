<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meow Café Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    transition:0.5s;
    background:linear-gradient(-45deg,#87CEEB,#ffd6e0,#c2ffd8,#a1c4fd);
    background-size:400% 400%;
    animation:bg 10s infinite;
    overflow-x:hidden;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 🌙 Dark Mode */
body.dark{
    background:#0b0f1a;
    color:white;
}

/* Header */
header{
    text-align:center;
    padding:120px 20px 20px;
}

h1{
    font-size:45px;
}

/* Flying Cat */
.cat{
    position:fixed;
    top:60px;
    width:80px;
    animation:fly 8s linear infinite;
    z-index:10;
}

@keyframes fly{
    0%{left:-10%;}
    100%{left:110%;}
}

/* Cards */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    width:250px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:10px;
    text-align:center;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#ff6ec7;
    color:white;
}

/* Cart */
#cart{
    position:fixed;
    right:10px;
    top:10px;
    background:white;
    padding:10px;
    border-radius:10px;
    width:180px;
}

/* Popup */
.popup{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#fff;
    padding:15px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<img class="cat" src="https://placekitten.com/200/200">

<button onclick="toggleDark()">🌙 Mode</button>

<div id="cart">
<h3>🛒 Cart</h3>
<ul id="cartList"></ul>
</div>

<header>
<h1>🐱 Meow Café Ultimate ☕🍰</h1>
<p>Cat • Coffee • Cakes • Happiness</p>
<button onclick="meowSound()">🔊 Meow</button>
<button onclick="coffeeSound()">☕ Coffee</button>
</header>

<h2 style="text-align:center">🐱 Cats</h2>
<div class="container">

<div class="card">
<img src="https://placekitten.com/300/300">
<p>Fluffy Cat</p>
<button onclick="add('Fluffy Cat')">Add</button>
</div>

<div class="card">
<img src="https://placekitten.com/301/300">
<p>Lazy Cat</p>
<button onclick="add('Lazy Cat')">Add</button>
</div>

</div>

<h2 style="text-align:center">🍰 Cakes</h2>
<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1542826438-bd32f43d626f">
<p>Chocolate Cake</p>
<button onclick="add('Cake')">Add</button>
</div>

</div>

<h2 style="text-align:center">☕ Coffee</h2>
<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<p>Latte</p>
<button onclick="add('Latte')">Add</button>
</div>

</div>

<div class="popup" id="popup">🐱 Order delivered by cat!</div>

<script>
let cart = [];

function add(item){
    cart.push(item);
    updateCart();
    showPopup();
}

function updateCart(){
    document.getElementById("cartList").innerHTML =
    cart.map(c=>"<li>"+c+"</li>").join("");
}

function showPopup(){
    let p = document.getElementById("popup");
    p.style.display="block";
    setTimeout(()=>p.style.display="none",2000);
}

/* 🔊 Fake sound using browser beep */
function meowSound(){
    let ctx = new AudioContext();
    let osc = ctx.createOscillator();
    osc.frequency.value = 600;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),200);
}

function coffeeSound(){
    let ctx = new AudioContext();
    let osc = ctx.createOscillator();
    osc.frequency.value = 200;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),300);
}

function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
